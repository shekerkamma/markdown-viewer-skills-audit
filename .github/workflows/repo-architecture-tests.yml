name: repo-architecture tests

on:
  push:
    branches: [main]
    paths:
      - 'repo-architecture/**'
      - '.github/workflows/repo-architecture-tests.yml'
  pull_request:
    paths:
      - 'repo-architecture/**'
      - '.github/workflows/repo-architecture-tests.yml'

jobs:
  unittest:
    name: Smoke tests (validate.py + render.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml
      - name: Run unittest suite
        working-directory: repo-architecture
        run: python -m unittest discover -s tests -v

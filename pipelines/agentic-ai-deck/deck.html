<h1 id="what-is-agentic-ai">What Is Agentic AI?</h1>
<div class="columns">
<div>
<h3 id="traditional-ai">Traditional AI</h3>
<p>Single prompt -&gt; single response</p>
<ul>
<li>No memory between interactions</li>
<li>Cannot use external tools or APIs</li>
<li>Human must orchestrate each step</li>
<li>Breaks on multi-step workflows</li>
</ul>
<h3 id="agentic-ai-1">Agentic AI</h3>
<p><strong>Perceive -&gt; Reason -&gt; Plan -&gt; Act -&gt; Learn</strong></p>
<ul>
<li>Persistent memory across sessions</li>
<li>Tool use: APIs, databases, enterprise systems</li>
<li>Multi-agent orchestration and delegation</li>
<li>Autonomous multi-step workflow execution</li>
</ul>
</div>
<div>
<h3 id="from-our-ai-agents-expert">From Our AI Agents Expert</h3>
<div class="grounded">
<div class="g-title">OpenHands Agent Architecture</div>
<div class="g-row"><span class="g-label">Pattern:</span> Stateless agent — all state lives in ConversationState</div>
<div class="g-row"><span class="g-label">Components:</span> LLM interface, Tool definitions, Context condenser, Agent context</div>
<div class="g-row"><span class="g-label">Step cycle:</span> Prepare messages from event history → condense context → LLM completion → dispatch actions</div>
<div class="g-note">Production architecture from OpenHands (~75K GitHub stars)</div>
</div>
</div>
</div>
<footer>Agentic AI Use Cases Across Industries | Grounded by Domain Agents</footer>
</section>

<h1 id="implementation-roadmap----from-pilot-to-production">Implementation Roadmap -- From Pilot to Production</h1>
<div class="columns">
<div>
<h3 id="phase-1-discovery-weeks-1-4">Phase 1: Discovery (Weeks 1-4)</h3>
<ul>
<li>Identify high-volume, rule-governed processes</li>
<li>Map workflows and decision points</li>
<li>Define agent scope, guardrails, escalation triggers</li>
<li>Establish success metrics and baselines</li>
</ul>
<h3 id="phase-2-build-weeks-5-12">Phase 2: Build (Weeks 5-12)</h3>
<ul>
<li>Design multi-agent architecture</li>
<li>Build tool integrations (ERP, CRM, TMS, WMS)</li>
<li>Implement governance: audit trails, policy guardrails</li>
<li>Deploy human-in-the-loop gates</li>
<li>Shadow mode: run parallel with human workers</li>
</ul>
</div>
<div>
<h3 id="phase-3-validate-weeks-13-16">Phase 3: Validate (Weeks 13-16)</h3>
<ul>
<li>Compare agent vs. human decisions on live data</li>
<li>Tune confidence thresholds (auto vs. escalated)</li>
<li>Regulatory review of explainability</li>
<li>Stress test with edge cases</li>
<li>Train ops teams on agent monitoring</li>
</ul>
<h3 id="phase-4-scale-weeks-17">Phase 4: Scale (Weeks 17+)</h3>
<ul>
<li>Go live at 40% volume</li>
<li>Expand to full volume over 4 weeks</li>
<li>Deploy Agent Command Center for governance</li>
<li>Extend to adjacent use cases</li>
<li>Continuous improvement: failures -&gt; training</li>
</ul>
</div>
</div>
<footer>Agentic AI Use Cases Across Industries | Grounded by Domain Agents</footer>
</section>

title: "SAP-O2C-Automation — Multi-Agent Order-to-Cash"
subtitle: "Replaces 17 Power Automate flows · ADK coordinator pattern · MCP bridge to SAP OData"
layout: three-column
style: ocean-teal

layers:
  user:
    - { name: "ADK Web UI",       subtitle: "Local dev console",  evidence: "agent/README.md mentions `adk web`" }
    - { name: "CLI / REPL",       subtitle: "adk run",            evidence: "agent/pyproject.toml entry point" }
    - { name: "Slack / Teams",    subtitle: "Workflow triggers",  evidence: "future — not in current code" }

  application:
    - { name: "Root Coordinator", subtitle: "Routes intent · dispatches",  evidence: "agent/agent.py + agent/prompt.py", highlight: true }
    - { name: "product",          subtitle: "Material master",             evidence: "agent/sub_agents/product/" }
    - { name: "inventory",        subtitle: "Stock levels",                evidence: "agent/sub_agents/inventory/" }
    - { name: "sales_order",      subtitle: "SO lifecycle",                evidence: "agent/sub_agents/sales_order/" }
    - { name: "outbound_delivery",subtitle: "Shipments",                   evidence: "agent/sub_agents/outbound_delivery/" }
    - { name: "single_entity_analyst", subtitle: "Per-entity Q&A",         evidence: "agent/sub_agents/single_entity_analyst/" }
    - { name: "cross_entity_analyst",  subtitle: "Joins across entities",  evidence: "agent/sub_agents/cross_entity_analyst/" }
    - { name: "charts",           subtitle: "Viz output",                  evidence: "agent/sub_agents/charts/" }
    - { name: "query_builder.py", subtitle: "OData filter/select/expand",  evidence: "agent/tools/query_builder.py" }
    - { name: "cross_entity.py",  subtitle: "Multi-entity join helpers",   evidence: "agent/tools/cross_entity.py" }

  ai:
    - { name: "Gemini API",       subtitle: "LLM reasoning · function-calling", evidence: "agent/pyproject.toml google-genai dep" }
    - { name: "ADK Framework",    subtitle: "Agent loop · tool dispatch",       evidence: "agent/pyproject.toml google-adk dep" }
    - { name: "MCP Client",       subtitle: "Tool discovery · invocation",      evidence: "ADK's MCP integration" }

  data:
    - { name: "server.ts",        subtitle: "MCP transport · stdio",       evidence: "mcp-server/src/server.ts + index.ts", highlight: true }
    - { name: "tool-definitions", subtitle: "Schema for each OData op",    evidence: "mcp-server/src/tool-definitions.ts", highlight: true }
    - { name: "handlers.ts",      subtitle: "Request → OData translation", evidence: "mcp-server/src/handlers.ts", highlight: true }
    - { name: "odata-clients",    subtitle: "HTTP client per service",     evidence: "mcp-server/src/odata-clients.ts" }
    - { name: "types.ts",         subtitle: "SAP entity TS types",         evidence: "mcp-server/src/types.ts" }

  infra:
    - { name: "BTP API Mgmt",     subtitle: "Credential proxy · audit",    evidence: "README — BTP Trial section" }
    - { name: "Destination Svc",  subtitle: "SAP system endpoints",        evidence: "README — BTP Destination" }
    - { name: "XSUAA / OAuth2",   subtitle: "Token issuance",              evidence: "BTP standard" }

  external:
    - { name: "Sales Order",      subtitle: "API_SALES_ORDER_SRV",          evidence: "mcp-server tool defs" }
    - { name: "Outbound Delivery",subtitle: "API_OUTBOUND_DELIVERY_SRV",    evidence: "mcp-server tool defs" }
    - { name: "Product",          subtitle: "API_PRODUCT_SRV",              evidence: "mcp-server tool defs" }
    - { name: "Stock",            subtitle: "API_MATERIAL_STOCK_SRV",       evidence: "mcp-server tool defs" }
    - { name: "Billing Doc",      subtitle: "API_BILLING_DOCUMENT_SRV",     evidence: "mcp-server tool defs" }
    - { name: "Business Partner", subtitle: "API_BUSINESS_PARTNER",         evidence: "mcp-server tool defs" }

sidebars:
  left:
    - title: "Dev Environment"
      items: ["Codespaces", ".devcontainer", "Dockerfile", "Zero local setup"]
    - title: "Mock Mode"
      items: ["mock-server.js", "Fixture data", "Offline dev", "No SAP needed"]
    - title: "Cost Profile"
      items: ["Gemini free tier", "BTP trial", "Codespaces free", "$0 / month"]
  right:
    - title: "Security"
      items: ["Credentials only in BTP", "Agent never sees secrets", "OAuth2 scopes", "Read-only by default"]
    - title: "Replaces"
      items: ["17 Power Automate flows", "Hand-coded mappings", "Brittle UI selectors", "4 Python classes"]
    - title: "Extensibility"
      items: ["Add sub-agent = 3 files", "Add OData svc = handler entry", "Mock-first development", "Same shape as P2P"]

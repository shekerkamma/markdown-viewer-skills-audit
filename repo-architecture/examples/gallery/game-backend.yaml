title: "Real-time Multiplayer Game Backend"
subtitle: "pipeline layout: a player input flows left to right through connect → match → tick → broadcast → persist"
layout: pipeline
style: ember-warm  # ignored — pipeline uses its own layout-native CSS

layer_titles:
  user:        "Connect"
  application: "Match"
  ai:          "Tick"
  data:        "Broadcast"
  external:    "Persist"

layers:
  user:
    - { name: "Edge Gateway",        subtitle: "TCP + UDP · TLS",       evidence: "edge/gateway/" }
    - { name: "Auth Token",          subtitle: "JWT · refresh",         evidence: "edge/auth/" }
    - { name: "Anti-cheat Probe",    subtitle: "Client integrity check", evidence: "edge/anticheat/" }
    - { name: "Region Selector",     subtitle: "Latency-based",         evidence: "edge/region/" }

  application:
    - { name: "Lobby Service",       subtitle: "Party · invite · ready",evidence: "match/lobby/" }
    - { name: "Matchmaker",          subtitle: "Skill + queue time",    evidence: "match/matchmaker/", highlight: true }
    - { name: "Server Allocator",    subtitle: "Spin up game session",  evidence: "match/allocator/" }
    - { name: "Game Server",         subtitle: "Authoritative sim",     evidence: "match/gameserver/" }

  ai:
    - { name: "Physics Tick",        subtitle: "60 Hz · deterministic", evidence: "tick/physics/" }
    - { name: "AI Bot Driver",       subtitle: "Behavior trees",        evidence: "tick/bots/" }
    - { name: "Cheat Detector",      subtitle: "Server-side validation",evidence: "tick/anticheat/" }
    - { name: "Match Scorer",        subtitle: "Live ranking",          evidence: "tick/scorer/" }

  data:
    - { name: "Snapshot Encoder",    subtitle: "Delta + interest mgmt", evidence: "broadcast/encode/" }
    - { name: "Reliable Channel",    subtitle: "Critical events",       evidence: "broadcast/reliable/" }
    - { name: "Unreliable Channel",  subtitle: "Position · facing",     evidence: "broadcast/unreliable/" }
    - { name: "Replay Capture",      subtitle: "Demo file write",       evidence: "broadcast/replay/" }

  external:
    - { name: "Match History DB",    subtitle: "Postgres · per-region", evidence: "persist/history/" }
    - { name: "Stats Service",       subtitle: "Aggregate · leaderboard",evidence: "persist/stats/" }
    - { name: "Inventory",           subtitle: "Cosmetic · progression",evidence: "persist/inventory/" }
    - { name: "Telemetry Sink",      subtitle: "ClickHouse · ML training",evidence: "persist/telemetry/" }

title: "Smart Home Hub — Local-first IoT Controller"
subtitle: "single-stack: focused product view, no cross-cutting concerns to call out"
layout: single-stack
style: dusk-glow

layers:
  user:
    - { name: "Mobile App",       subtitle: "iOS + Android",          evidence: "app/mobile/" }
    - { name: "Web Dashboard",    subtitle: "Browser control",        evidence: "app/web/" }
    - { name: "Voice (Alexa)",    subtitle: "Skill bridge",           evidence: "app/voice/alexa/" }
    - { name: "Voice (Google)",   subtitle: "Action bridge",          evidence: "app/voice/google/" }
    - { name: "Wall Panel",       subtitle: "Touchscreen client",     evidence: "app/panel/" }

  application:
    - { name: "Device Gateway",   subtitle: "Per-protocol adapters",  evidence: "core/gateway/", highlight: true }
    - { name: "Automation Engine",subtitle: "Triggers · scenes · routines", evidence: "core/automation/", highlight: true }
    - { name: "Scene Orchestrator", subtitle: "Multi-device state",   evidence: "core/scenes/" }
    - { name: "Scheduler",        subtitle: "Time-based actions",     evidence: "core/scheduler/" }

  ai:
    - { name: "Anomaly Detector", subtitle: "Energy + presence",      evidence: "ai/anomaly/" }
    - { name: "Voice Intent",     subtitle: "Local fallback",         evidence: "ai/intent/" }
    - { name: "Pattern Learner",  subtitle: "Suggested routines",     evidence: "ai/pattern/" }

  data:
    - { name: "Time-Series DB",   subtitle: "Sensor history",         evidence: "store/tsdb/" }
    - { name: "Device Registry",  subtitle: "Inventory + state",      evidence: "store/registry/" }
    - { name: "Event Log",        subtitle: "Action audit",           evidence: "store/events/" }

  infra:
    - { name: "MQTT Broker",      subtitle: "Local pub/sub",          evidence: "infra/mqtt/" }
    - { name: "Edge Runtime",     subtitle: "Raspberry Pi / mini PC", evidence: "infra/edge/" }
    - { name: "Local DNS",        subtitle: "mDNS · Avahi",           evidence: "infra/dns/" }

  external:
    - { name: "Hue Bridge",       subtitle: "Zigbee bulbs",           evidence: "integrations/hue/" }
    - { name: "Z-Wave Hub",       subtitle: "Mesh sensors · locks",   evidence: "integrations/zwave/" }
    - { name: "Matter / Thread",  subtitle: "Native IP devices",      evidence: "integrations/matter/" }
    - { name: "Cloud Backup",     subtitle: "Optional · encrypted",   evidence: "integrations/backup/" }

title: "Electronic Health Records Platform"
subtitle: "three-column: reliability sidebar (uptime is patient safety) + compliance sidebar (HIPAA shapes everything)"
layout: three-column
style: sage-forest

layers:
  user:
    - { name: "Clinician Workstation", subtitle: "EHR UI · order entry",  evidence: "src/web/clinician/" }
    - { name: "Patient Portal",        subtitle: "Records · messaging",   evidence: "src/web/patient/" }
    - { name: "Lab Tech Console",      subtitle: "Result entry",          evidence: "src/web/lab/" }
    - { name: "Mobile (clinician)",    subtitle: "Bedside rounding",      evidence: "src/mobile/" }
    - { name: "Billing Console",       subtitle: "Coder + biller",        evidence: "src/web/billing/" }

  application:
    - { name: "EHR Core",            subtitle: "Patient · encounter · order", evidence: "src/core/", highlight: true }
    - { name: "Scheduling",          subtitle: "Resources + clinicians",      evidence: "src/scheduling/" }
    - { name: "ePrescribing",        subtitle: "Drug interactions · dosing",  evidence: "src/rx/" }
    - { name: "Order Routing",       subtitle: "Lab · imaging · referral",    evidence: "src/orders/" }
    - { name: "Charge Capture",      subtitle: "Visit → claim",                evidence: "src/billing/" }

  ai:
    - { name: "Clinical Decision Support", subtitle: "Best-practice alerts",   evidence: "src/cds/" }
    - { name: "Clinical NLP",              subtitle: "Note → structured data", evidence: "src/nlp/" }
    - { name: "Sepsis Early Warning",      subtitle: "Vitals model · 4hr lead",evidence: "src/sepsis/" }

  data:
    - { name: "FHIR Store",        subtitle: "R4 · patient record",   evidence: "data/fhir/" }
    - { name: "Document Store",    subtitle: "Scanned · faxed",       evidence: "data/docs/" }
    - { name: "DICOM Archive",     subtitle: "Imaging · PACS",        evidence: "data/dicom/" }
    - { name: "Audit Log",         subtitle: "Every PHI access",      evidence: "data/audit/" }
    - { name: "Operational Store", subtitle: "Scheduling · billing",  evidence: "data/ops/" }

  infra:
    - { name: "Private VPC",       subtitle: "No public ingress",     evidence: "infra/vpc/" }
    - { name: "BAA-Covered Cloud", subtitle: "AWS HIPAA-eligible",    evidence: "infra/cloud/" }
    - { name: "VPN Gateway",       subtitle: "Hospital site links",   evidence: "infra/vpn/" }
    - { name: "Network Segmentation", subtitle: "Per-environment",    evidence: "infra/segments/" }

  external:
    - { name: "Reference Lab",     subtitle: "Quest · LabCorp HL7",   evidence: "integrations/lab/" }
    - { name: "Pharmacy Network",  subtitle: "Surescripts ePrescribe",evidence: "integrations/rx/" }
    - { name: "Payers",            subtitle: "Eligibility · claims",  evidence: "integrations/payer/" }
    - { name: "HIE",               subtitle: "Regional record share", evidence: "integrations/hie/" }
    - { name: "Imaging Vendors",   subtitle: "DICOM modality",        evidence: "integrations/imaging/" }

sidebars:
  left:
    - title: "Reliability"
      items: ["Active-active multi-AZ", "Hot standby region", "Daily snapshot", "RTO < 1h", "RPO < 5min"]
    - title: "Operations"
      items: ["24/7 NOC", "Per-tenant SLA", "Patch windows", "Maintenance bypass"]
    - title: "Performance"
      items: ["Chart load < 2s", "Order entry < 1s", "Capacity headroom 40%"]
  right:
    - title: "HIPAA"
      items: ["Privacy Rule", "Security Rule", "Breach Notification", "BAAs with all vendors"]
    - title: "Compliance"
      items: ["SOC 2 Type II", "HITRUST CSF", "21 CFR Part 11", "State-specific (e.g. NY SHIELD)"]
    - title: "Patient Rights"
      items: ["Right of access", "Amendment workflow", "Accounting of disclosures", "Restriction requests"]

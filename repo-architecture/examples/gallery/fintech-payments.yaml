title: "Payments Platform — Real-time Card Processing"
subtitle: "two-column-split: regulatory + audit concerns earn their own panel; the operational side stays in the main flow"
layout: two-column-split
style: slate-dark

layers:
  user:
    - { name: "Merchant Dashboard", subtitle: "Settlement + dispute UI",  evidence: "src/web/merchant/" }
    - { name: "Checkout SDK",       subtitle: "Hosted fields · 3DS",      evidence: "sdk/checkout/" }
    - { name: "Treasury Portal",    subtitle: "Internal ops",             evidence: "src/web/treasury/" }
    - { name: "Webhook Receiver",   subtitle: "Merchant integrations",    evidence: "src/api/webhooks/" }

  application:
    - { name: "Payment Gateway",    subtitle: "Auth · capture · refund",  evidence: "src/gateway/", highlight: true }
    - { name: "Ledger Service",     subtitle: "Double-entry accounting",  evidence: "src/ledger/", highlight: true }
    - { name: "Settlement Engine",  subtitle: "Net-out merchant payouts", evidence: "src/settlement/" }
    - { name: "Reconciliation",     subtitle: "Match acquirer reports",   evidence: "src/recon/" }
    - { name: "Dispute Workflow",   subtitle: "Chargebacks · evidence",   evidence: "src/dispute/" }
    - { name: "Notification",       subtitle: "Webhooks + email",         evidence: "src/notify/" }

  ai:
    - { name: "Fraud Scorer",       subtitle: "Real-time risk signal",    evidence: "src/fraud/model.py" }
    - { name: "AML Screening",      subtitle: "Sanctions + PEP lists",    evidence: "src/aml/" }
    - { name: "3DS Adaptive",       subtitle: "Step-up only when risky",  evidence: "src/3ds/" }

  data:
    - { name: "Ledger Postgres",    subtitle: "Multi-AZ · point-in-time", evidence: "infra/db/ledger" }
    - { name: "Token Vault",        subtitle: "PCI scope isolation",      evidence: "infra/vault/" }
    - { name: "Audit Log",          subtitle: "Append-only · WORM",       evidence: "infra/audit/" }
    - { name: "Kafka",              subtitle: "Settlement events",        evidence: "infra/kafka/" }
    - { name: "Cold Storage",       subtitle: "S3 Object Lock · 7yr",     evidence: "infra/s3-archive/" }

  infra:
    - { name: "HSM Cluster",        subtitle: "Card key custody",         evidence: "infra/hsm/" }
    - { name: "KMS",                subtitle: "Application-level keys",   evidence: "infra/kms/" }
    - { name: "VPC + Private Link", subtitle: "Card data network",        evidence: "infra/network/" }
    - { name: "Multi-region Active",subtitle: "us-east + eu-west",        evidence: "infra/regions/" }

  external:
    - { name: "Visa Direct",        subtitle: "Card network",             evidence: "integrations/visa/" }
    - { name: "Mastercard",         subtitle: "Card network",             evidence: "integrations/mc/" }
    - { name: "Acquiring Banks",    subtitle: "Settlement rails",         evidence: "integrations/acquirers/" }
    - { name: "FX Rates",           subtitle: "Bloomberg + fallback",     evidence: "integrations/fx/" }

sidebars:
  right:
    - title: "PCI DSS"
      items: ["Cardholder data isolated", "HSM-backed encryption", "Quarterly scans", "Annual SAQ-D"]
    - title: "Audit & Controls"
      items: ["SOX evidence flow", "SoD enforced", "Immutable audit log", "Quarterly review"]
    - title: "AML / KYC"
      items: ["Sanctions screening", "Beneficial owner check", "Suspicious activity report", "Travel Rule (Crypto)"]

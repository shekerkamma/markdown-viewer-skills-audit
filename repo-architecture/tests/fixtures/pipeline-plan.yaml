title: "Customer Events — Ingest to Insight"
subtitle: "Demo of the pipeline layout (horizontal stages, layer→stage mapping)"
layout: pipeline
style: ocean-teal  # ignored by pipeline layout (uses pipeline.md's own CSS)

# Pipeline maps populated layers to stages in order. Stage title comes from
# layer_titles override, otherwise from the layer name.
layer_titles:
  user:        "Ingest"
  application: "Process"
  ai:          "Score"
  data:        "Store"
  external:    "Serve"

layers:
  user:
    - { name: "Webhook Gateway", subtitle: "3rd-party events", evidence: "ingest/webhook.ts" }
    - { name: "Kafka Topic",     subtitle: "events.raw",       evidence: "ingest/topics.yaml" }
    - { name: "CDC Stream",      subtitle: "Postgres → Debezium", evidence: "ingest/cdc/" }
  application:
    - { name: "Stream Engine",   subtitle: "Flink",      evidence: "process/flink/", highlight: true }
    - { name: "Validator",       subtitle: "schema + PII",      evidence: "process/validate/" }
    - { name: "Enricher",        subtitle: "user + geo",        evidence: "process/enrich/" }
  ai:
    - { name: "Anomaly Model",   subtitle: "Isolation Forest",  evidence: "score/anomaly/" }
    - { name: "Segment Tagger",  subtitle: "rules + embeddings",evidence: "score/segment/" }
  data:
    - { name: "Iceberg Lake",    subtitle: "events.gold",       evidence: "store/iceberg/" }
    - { name: "ClickHouse",      subtitle: "OLAP",              evidence: "store/clickhouse/" }
    - { name: "Pinecone",        subtitle: "embedding index",   evidence: "store/pinecone/" }
  external:
    - { name: "Reco API",        subtitle: "real-time",         evidence: "serve/api/" }
    - { name: "BI Dashboard",    subtitle: "Looker",            evidence: "serve/looker/" }

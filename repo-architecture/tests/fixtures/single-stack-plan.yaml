title: "URL Shortener — focused service view"
subtitle: "Demo of the single-stack layout (no sidebars, full-width layers)"
layout: single-stack
style: frost-clean

layers:
  user:
    - { name: "Web Form",  subtitle: "shorten URL",  evidence: "src/web/form.tsx" }
    - { name: "Public CLI", subtitle: "curl shorten", evidence: "examples/cli.sh" }
  application:
    - { name: "Shortener API",  subtitle: "POST /shorten · GET /:slug", evidence: "src/api/shorten.ts", highlight: true }
    - { name: "Slug Generator", subtitle: "base62 + collision retry",   evidence: "src/api/slug.ts" }
    - { name: "Click Recorder", subtitle: "async write",                 evidence: "src/api/click.ts" }
  data:
    - { name: "Postgres",     subtitle: "slug → url",        evidence: "src/db/schema.sql" }
    - { name: "Redis Cache",  subtitle: "hot slug lookup",   evidence: "src/cache/" }
    - { name: "Click Stream", subtitle: "Kafka topic",       evidence: "src/stream/" }
  infra:
    - { name: "Fly.io",     subtitle: "regional edges",      evidence: "fly.toml" }
    - { name: "Cloudflare", subtitle: "CDN + DDoS",          evidence: "infra/cf.tf" }
